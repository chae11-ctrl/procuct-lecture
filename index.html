<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 따뜻한 덕담</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="theme-switcher">
        <label for="theme-toggle">다크 모드</label>
        <input type="checkbox" id="theme-toggle" />
    </div>

    <main class="container">
        <div class="card">
            <h1>오늘의 덕담</h1>
            <div id="fortune-display" class="fortune-text">
                "버튼을 눌러 오늘의 응원을 확인하세요."
            </div>
            <button id="generate-fortune">운세 확인하기</button>
        </div>
    </main>

    <section class="container affiliate-inquiry">
        <h2>문의하기</h2>
        <form action="https://formspree.io/f/mkovlngp" method="POST">
            <div class="form-group">
                <label for="name">이름:</label>
                <input type="text" id="name" name="name" required placeholder="이름을 입력해주세요">
            </div>
            <div class="form-group">
                <label for="email">이메일:</label>
                <input type="email" id="email" name="email" required placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label for="message">메시지:</label>
                <textarea id="message" name="message" rows="3" required placeholder="전하고 싶은 메시지를 남겨주세요"></textarea>
            </div>
            <button type="submit">전송하기</button>
        </form>
    </section>

    <script src="main.js"></script>
</body>
</html>
